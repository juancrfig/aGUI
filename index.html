<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aGUI Dev Server</title>
  <style>
    body {
      margin: 0;
      background: #0a1a1a;
      color: #ffe6cb;
      font-family: ui-sans-serif, system-ui, sans-serif;
      min-height: 100vh;
    }
    #root {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
  </style>
  <!-- React CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Mock Hermes SDK -->
  <script>
    window.__HERMES_PLUGIN_SDK__ = {
      React: window.React,
      hooks: {
        useState: window.React.useState,
        useEffect: window.React.useEffect,
        useCallback: window.React.useCallback,
        useRef: window.React.useRef,
        useMemo: window.React.useMemo,
      },
      components: {
        Button: function(props) {
          return window.React.createElement('button', props, props.children);
        },
        Input: window.React.forwardRef(function(props, ref) {
          return window.React.createElement('input', { ...props, ref });
        }),
        Badge: function(props) {
          return window.React.createElement('span', { className: props.className }, props.children);
        },
      },
      utils: {
        cn: function(...classes) { return classes.filter(Boolean).join(' '); },
      },
      fetchJSON: async function(url, options) {
        const res = await fetch(url, options);
        return res.json();
      },
    };
    window.__HERMES_PLUGINS__ = {
      register: function(name, component) {
        console.log('[Hermes Mock] Plugin registered:', name);
        const root = document.getElementById('root');
        if (root) {
          const el = window.React.createElement(component);
          window.ReactDOM.createRoot(root).render(el);
        }
      }
    };
    window.__HERMES_DASHBOARD__ = {
      navigate: function(path) { console.log('[Hermes Mock] Navigate to:', path); },
    };
  </script>
  <link rel="stylesheet" href="/src/plugin/dist/style.css">
</head>
<body>
  <div id="root"></div>
  <script src="/src/plugin/dist/index.js"></script>
</body>
</html>
